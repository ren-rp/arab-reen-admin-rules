<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEC Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0b0c14;
  --bg2:#10121c;
  --panel:#12141f;
  --row:#171a27;
  --row2:#1c2030;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.12);
  --txt:#eceef5;
  --dim:rgba(236,238,245,.55);
  --mute:rgba(236,238,245,.32);
  --acc:#8b35eb;
  --acc2:rgba(139,53,235,.22);
  --acc3:rgba(139,53,235,.45);
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
  --shadow:0 24px 80px rgba(0,0,0,.72);
  --r:8px;
}

/* ── Boot picker ── */
#boot{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  width:360px;padding:26px 24px 20px;display:none;z-index:50;
  background:rgba(11,12,20,.78);border:1px solid var(--line2);
  border-radius:12px;backdrop-filter:blur(18px);box-shadow:var(--shadow);text-align:center;
}
#boot.show{display:block}
#boot .brand{color:var(--txt);font-size:22px;font-weight:800;letter-spacing:3px}
#boot .sub{color:var(--dim);font-size:12px;margin:10px 0 16px;line-height:1.55}
#boot .cap{
  min-height:58px;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.4);border:1px solid var(--line2);border-radius:8px;
  color:#fff;font-size:20px;font-weight:700;letter-spacing:1px;
}
#boot .hint{color:var(--mute);font-size:11px;margin-top:12px;line-height:1.7}
#boot .hint b{color:var(--dim)}

/* ── Shell ── */
#shell{
  position:fixed;left:42px;top:50%;transform:translateY(-50%);
  display:none;gap:12px;align-items:stretch;z-index:20;
}
#shell.show{display:flex}

#menu{
  width:920px;height:560px;display:flex;flex-direction:column;
  background:rgba(11,12,20,.96);border:1px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow);overflow:hidden;
}

#top{
  height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(139,53,235,.08),transparent);
}
#top .brand{font-size:15px;font-weight:800;letter-spacing:1.5px;color:var(--txt)}
#top .gear{
  width:30px;height:30px;border-radius:7px;border:1px solid var(--line);
  background:rgba(255,255,255,.03);color:var(--dim);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
}
#top .gear:hover,#top .gear.on{color:#fff;border-color:var(--acc3);background:var(--acc2)}

#body{flex:1;display:flex;min-height:0}

/* Sidebar */
#side{
  width:168px;flex-shrink:0;border-right:1px solid var(--line);
  background:rgba(0,0,0,.22);overflow-y:auto;padding:8px 0 12px;
  scrollbar-width:thin;scrollbar-color:var(--acc3) transparent;
}
#side::-webkit-scrollbar{width:3px}
#side::-webkit-scrollbar-thumb{background:var(--acc3);border-radius:3px}

.sg{margin:10px 0 4px;padding:0 14px;font-size:10px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--mute)}
.si{
  display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:7px;
  color:var(--dim);font-size:12.5px;font-weight:600;cursor:pointer;transition:.12s ease;
}
.si svg{width:15px;height:15px;opacity:.75;flex-shrink:0}
.si:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.si.active{background:var(--acc2);color:#fff;box-shadow:inset 2px 0 0 var(--acc)}
.si.active svg{opacity:1}

/* Content */
#main{flex:1;display:flex;min-width:0;min-height:0;position:relative}
#cols{flex:1;display:flex;min-width:0;min-height:0;padding:12px;gap:12px}
.col{
  flex:1;min-width:0;display:flex;flex-direction:column;background:rgba(0,0,0,.18);
  border:1px solid var(--line);border-radius:8px;overflow:hidden;
}
.col-h{
  padding:10px 12px 8px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--dim);border-bottom:1px solid var(--line);background:rgba(255,255,255,.02);
}
.col-b{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--acc) transparent}
.col-b::-webkit-scrollbar{width:3px}
.col-b::-webkit-scrollbar-thumb{background:var(--acc);border-radius:3px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.btn{
  height:32px;border:1px solid var(--line);border-radius:6px;background:var(--row);
  color:var(--txt);font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.1s ease;padding:0 8px;gap:6px;
}
.btn:hover{background:var(--row2);border-color:var(--line2)}
.btn:active{transform:scale(.98)}
.btn.wide{width:100%;margin-bottom:6px}
.btn.acc{background:var(--acc2);border-color:var(--acc3)}
.btn .g{opacity:.45;font-size:11px}

.row{
  display:flex;align-items:center;gap:8px;min-height:34px;padding:0 10px;margin-bottom:3px;
  background:var(--row);border:1px solid transparent;border-radius:6px;cursor:pointer;color:var(--txt);font-size:12px;
}
.row:hover{background:var(--row2);border-color:var(--line)}
.row .lab{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:550}
.row .badge{font-size:10px;color:var(--acc);background:var(--acc2);padding:2px 6px;border-radius:4px;font-weight:700}
.row .chk{
  width:14px;height:14px;border-radius:3px;border:1.5px solid var(--line2);flex-shrink:0;
  background:transparent;position:relative;
}
.row .chk.on{background:var(--acc);border-color:var(--acc)}
.row .chk.on:after{content:"";position:absolute;left:3px;top:0;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.row.active{border-color:var(--acc3);background:rgba(139,53,235,.12)}

.tog{
  width:34px;height:18px;border-radius:99px;background:rgba(255,255,255,.12);position:relative;flex-shrink:0;transition:.15s;
}
.tog i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.15s}
.tog.on{background:var(--acc)}
.tog.on i{left:18px}

.slidebox{display:flex;align-items:center;gap:6px;flex-shrink:0}
.slidebox .val{min-width:28px;text-align:center;font-size:11px;font-weight:700;color:var(--acc)}
.slidebox input[type=range]{-webkit-appearance:none;appearance:none;width:90px;height:3px;background:rgba(255,255,255,.12);border-radius:3px;outline:none}
.slidebox input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer}
.spin{display:flex;align-items:center;gap:4px;flex-shrink:0}
.spin .arr,.slidebox .arr{
  width:22px;height:22px;border-radius:5px;border:1px solid var(--line);background:rgba(255,255,255,.04);
  color:var(--txt);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;
}
.spin .arr:hover,.slidebox .arr:hover{background:var(--acc2);border-color:var(--acc3)}
.spin .val{min-width:36px;text-align:center;font-size:11px;font-weight:700;color:var(--dim)}

.dd{
  display:flex;align-items:center;justify-content:space-between;gap:8px;height:32px;padding:0 10px;margin-bottom:6px;
  background:var(--row);border:1px solid var(--line);border-radius:6px;color:var(--txt);font-size:12px;cursor:pointer;
}
.dd:hover{border-color:var(--line2)}
.dd .v{color:var(--dim);font-size:11px}
.search{
  width:100%;height:32px;margin-bottom:8px;padding:0 10px;border-radius:6px;border:1px solid var(--line);
  background:rgba(0,0,0,.35);color:var(--txt);font-size:12px;outline:none;
}
.search:focus{border-color:var(--acc3)}
.sec-mini{font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--mute);margin:10px 2px 6px}
.empty{padding:24px;text-align:center;color:var(--mute);font-size:12px}
.soon{padding:40px 20px;text-align:center;color:var(--mute);font-size:13px;line-height:1.7}
.soon b{color:var(--dim);display:block;margin-bottom:6px;font-size:15px}

/* Player info card */
#pinfo{
  width:210px;flex-shrink:0;display:none;flex-direction:column;
  background:rgba(11,12,20,.96);border:1px solid var(--danger);
  border-radius:10px;box-shadow:var(--shadow);overflow:hidden;
}
#pinfo.show{display:flex}
#pinfo .ph{
  padding:12px;border-bottom:1px solid rgba(239,68,68,.35);
  background:linear-gradient(180deg,rgba(239,68,68,.12),transparent);
}
#pinfo .ph .n{font-size:14px;font-weight:800;color:#fff}
#pinfo .ph .s{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
#pinfo .pb{flex:1;overflow-y:auto;padding:8px 10px;scrollbar-width:thin}
.pi{display:flex;justify-content:space-between;gap:8px;padding:7px 4px;border-bottom:1px solid var(--line);font-size:11px}
.pi .k{color:var(--mute);font-weight:600}
.pi .v{color:var(--txt);font-weight:650;text-align:right;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Keybind list */
#kblist{
  position:fixed;right:24px;top:120px;width:210px;display:none;z-index:15;
  background:rgba(11,12,20,.55);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;backdrop-filter:blur(12px);overflow:hidden;
}
#kblist.show{display:block}
#kblist .kh{
  padding:8px 10px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);border-bottom:1px solid var(--line);cursor:move;background:rgba(139,53,235,.1);
}
#kblist .kb{padding:6px;max-height:260px;overflow-y:auto}
#kblist .ki{display:flex;justify-content:space-between;gap:8px;padding:6px 8px;font-size:11px;border-radius:5px}
#kblist .ki:hover{background:rgba(255,255,255,.04)}
#kblist .a{color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#kblist .k{color:var(--acc);font-weight:700;flex-shrink:0}
#kblist .empty{padding:14px;text-align:center;color:var(--mute);font-size:11px}

/* Modal / ctx / bind capt */
#modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60;
  background:rgba(0,0,0,.35);
}
#modal.show{display:flex}
#modal .box{
  width:340px;padding:18px;background:rgba(16,18,28,.96);border:1px solid var(--line2);
  border-radius:10px;box-shadow:var(--shadow);
}
#modal h3{font-size:14px;color:#fff;margin-bottom:4px}
#modal p{font-size:11px;color:var(--dim);margin-bottom:12px;line-height:1.5}
#modal input{
  width:100%;height:36px;padding:0 10px;border-radius:7px;border:1px solid var(--line2);
  background:rgba(0,0,0,.4);color:#fff;font-size:13px;outline:none;margin-bottom:12px;
}
#modal input:focus{border-color:var(--acc)}
#modal .acts{display:flex;gap:8px;justify-content:flex-end}
#ctx{
  position:fixed;display:none;z-index:70;min-width:150px;padding:4px;
  background:rgba(16,18,28,.98);border:1px solid var(--line2);border-radius:8px;box-shadow:var(--shadow);
}
#ctx.show{display:block}
#ctx div{padding:8px 12px;font-size:12px;color:var(--txt);border-radius:5px;cursor:pointer}
#ctx div:hover{background:var(--acc2)}
#kbcapt{
  position:fixed;left:50%;bottom:48px;transform:translateX(-50%);display:none;z-index:80;
  padding:10px 18px;background:rgba(11,12,20,.9);border:1px solid var(--acc3);border-radius:8px;
  color:#fff;font-size:12px;font-weight:650;box-shadow:var(--shadow);
}
#kbcapt.show{display:block}
#kbcapt span{color:var(--acc)}
</style>
</head>
<body>

<div id="boot">
  <div class="brand">MEC</div>
  <div class="sub">Choose the key or mouse button that opens the menu</div>
  <div class="cap" id="bootCap">. . .</div>
  <div class="hint">Press a key / mouse button to preview<br><b>ENTER</b> confirm · <b>ESC</b> reset</div>
</div>

<div id="shell">
  <div id="menu">
    <div id="top">
      <div class="brand">MEC</div>
      <div class="gear" id="btnSettings" title="Settings">⚙</div>
    </div>
    <div id="body">
      <div id="side"></div>
      <div id="main"><div id="cols"></div></div>
    </div>
  </div>
  <div id="pinfo">
    <div class="ph"><div class="n" id="piName">—</div><div class="s" id="piSub">—</div></div>
    <div class="pb" id="piBody"></div>
  </div>
</div>

<div id="kblist">
  <div class="kh" id="kbDrag">Keybinds</div>
  <div class="kb" id="kbBody"><div class="empty">No keybinds yet</div></div>
</div>

<div id="modal">
  <div class="box">
    <h3 id="modalTitle">Teleport to Coords</h3>
    <p id="modalSub">Enter X, Y, Z — Enter to confirm, Esc to cancel</p>
    <input id="modalInput" spellcheck="false" autocomplete="off">
    <div class="acts">
      <button class="btn" id="modalCancel" type="button">Cancel</button>
      <button class="btn acc" id="modalOk" type="button">Teleport</button>
    </div>
  </div>
</div>

<div id="ctx">
  <div data-act="bind">Set Keybind</div>
  <div data-act="unbind">Remove Keybind</div>
</div>
<div id="kbcapt">Press a key to bind <span>…</span> · ESC cancel</div>

<script>
(function(){
"use strict";

var ANIMALS = [
  "a_c_boar","a_c_cat_01","a_c_chickenhawk","a_c_chimp","a_c_chop","a_c_cormorant","a_c_cow","a_c_coyote",
  "a_c_crow","a_c_deer","a_c_dolphin","a_c_fish","a_c_hen","a_c_humpback","a_c_husky","a_c_killerwhale",
  "a_c_mtlion","a_c_pig","a_c_pigeon","a_c_poodle","a_c_pug","a_c_rabbit_01","a_c_rat","a_c_retriever",
  "a_c_rhesus","a_c_rottweiler","a_c_seagull","a_c_sharkhammer","a_c_sharktiger","a_c_shepherd",
  "a_c_stingray","a_c_westy"
];
var PICKUPS = ["Health","Armor","Ammo","Weapon Pistol","Weapon SMG","Money Bag"];
var OBJECTS = ["prop_barrier_work05","prop_mp_barrier_02b","prop_roadcone02a","prop_boxpile_07d","prop_container_01a","prop_dumpster_01a"];
var WEAPONS = ["WEAPON_PISTOL","WEAPON_COMBATPISTOL","WEAPON_APPISTOL","WEAPON_SMG","WEAPON_ASSAULTRIFLE","WEAPON_CARBINERIFLE","WEAPON_PUMPSHOTGUN","WEAPON_SNIPERRIFLE","WEAPON_RPG","WEAPON_MINIGUN","WEAPON_STUNGUN","WEAPON_KNIFE"];
var VEHICLES = ["Random","Adder","Zentorno","T20","Insurgent","Rhino","Oppressor2","Buzzard2","Lazer","Kuruma","Sultan","Phantom"];
var PARTICLES = ["exp_grd_grenade","ent_ray_heli_aprtmnt_l_fire","scr_clown_appears","scr_alien_disintegrate","scr_agencyheist_laser","ent_dst_elec_fire_sp"];
var NPCS = ["a_m_m_skater_01","s_m_y_swat_01","g_m_y_ballasout_01","u_m_y_zombie_01","a_m_y_mexthug_01","mp_m_freemode_01"];

var ICONS = {
  player:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  server:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="8" rx="2"/><rect x="2" y="13" width="20" height="8" rx="2"/><path d="M6 7h.01M6 17h.01"/></svg>',
  weapon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5L3 6l2-2 4 1 7 7"/><path d="M13 13l6 6"/><path d="M16 16l4-1 1-4"/></svg>',
  combat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>',
  vehicle:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17h14v-5l-2-5H7L5 12v5z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/></svg>',
  misc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',
  safe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  risky:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>'
};

var NAV = [
  {group:"Self Options", items:[
    {id:"player", label:"Player", icon:"player"},
    {id:"weapon", label:"Weapon", icon:"weapon"},
    {id:"combat", label:"Combat", icon:"combat"},
    {id:"vehicle", label:"Vehicle", icon:"vehicle"}
  ]},
  {group:"Server", items:[
    {id:"server_list", label:"List", icon:"list"},
    {id:"server_safe", label:"Safe", icon:"safe"},
    {id:"server_risky", label:"Risky", icon:"risky"}
  ]},
  {group:"Other", items:[
    {id:"misc", label:"Misc", icon:"misc"},
    {id:"settings", label:"Settings", icon:"settings"}
  ]}
];

var S = {
  visible:false, boot:false, tab:"player",
  toggles:{}, values:{}, dd:{}, keybinds:{},
  players:[], selectedPlayers:{}, friendMap:{},
  hoverPlayer:null, search:"", showKeybindList:true,
  bindingAction:null, ctxTarget:null
};

var side = document.getElementById("side");
var cols = document.getElementById("cols");
var shell = document.getElementById("shell");
var boot = document.getElementById("boot");
var bootCap = document.getElementById("bootCap");
var pinfo = document.getElementById("pinfo");
var kblist = document.getElementById("kblist");
var kbBody = document.getElementById("kbBody");
var modal = document.getElementById("modal");
var modalInput = document.getElementById("modalInput");
var ctx = document.getElementById("ctx");
var kbcapt = document.getElementById("kbcapt");
var btnSettings = document.getElementById("btnSettings");

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];}); }
function tget(k){ return !!S.toggles[k]; }
function vget(k,d){ return S.values[k]!==undefined?S.values[k]:d; }
function dget(k,d){ return S.dd[k]!==undefined?S.dd[k]:d; }
function isFriend(sid){ return !!S.friendMap[String(sid)] || !!S.friendMap[sid]; }
function bindBadge(a){ var b=S.keybinds[a]; return b?'<span class="badge">'+esc(b.name)+'</span>':''; }

function send(a,v,e){
  var item={a:a,action:a,v:v==null?"":v,value:v==null?"":v,e:e||{},extra:e||{}};
  window.__MEC_Q = window.__MEC_Q || [];

function mkToggle(label, key, action){
  var row=document.createElement("div");

  row.innerHTML='<span class="lab">'+esc(label)+'</span>'+bindBadge(action)+'<span class="tog '+(on?"on":"")+'"><i></i></span>';
  row.addEventListener("click",function(){

  return row;
}

function mkSlider(label, key, action, min, max, def){
  var row=document.createElement("div");
  row.className="row";
  var val=vget(key,def);
  row.innerHTML='<span class="lab">'+esc(label)+'</span>'+bindBadge(action)+
    '<span class="slidebox"><span class="arr" data-d="-1">‹</span><span class="val">'+val+'</span><input type="range" min="'+min+'" max="'+max+'" step="1" value="'+val+'"><span class="arr" data-d="1">›</span></span>';
  var range=row.querySelector("input");
  var valEl=row.querySelector(".val");
  function apply(v,fire){
    v=Math.max(min,Math.min(max,v|0));
    S.values[key]=v; valEl.textContent=v; range.value=v;
    if(fire) send(action,v,{key:key});
  }
  range.addEventListener("input",function(){ apply(parseInt(range.value,10),false); });
  range.addEventListener("change",function(){ apply(parseInt(range.value,10),true); });
  row.querySelectorAll(".arr").forEach(function(a){
    a.addEventListener("click",function(e){ e.stopPropagation(); apply(vget(key,def)+parseInt(a.dataset.d,10),true); });
  });
  row.addEventListener("contextmenu",function(e){ e.preventDefault(); openCtx(e.clientX,e.clientY,{action:action,label:label}); });
  return row;
}

function mkCycle(label, key, action, min, max, def){
  var row=document.createElement("div");
  row.className="row";
  var val=vget(key,def);
  row.innerHTML='<span class="lab">'+esc(label)+'</span>'+bindBadge(action)+
    '<span class="spin"><span class="arr" data-d="-1">‹</span><span class="val">'+val+'</span><span class="arr" data-d="1">›</span></span>';
  row.querySelectorAll(".arr").forEach(function(a){
    a.addEventListener("click",function(e){
      e.stopPropagation();
      var cur=vget(key,def)+parseInt(a.dataset.d,10);
      if(cur<min) cur=max; if(cur>max) cur=min;
      S.values[key]=cur; send(action,cur,{key:key}); render();
    });
  });
  row.addEventListener("contextmenu",function(e){ e.preventDefault(); openCtx(e.clientX,e.clientY,{action:action,label:label}); });
  return row;
}

function mkDropdown(key, options, label){

function activate(it){
  if(it.modal==="coords"){ openModal(); return; }
  if(it.action==="list_select_all"){
    S.players.forEach(function(p){ S.selectedPlayers[p.id]=true; });
    send("list_select_all",""); render(); return;
  }
  if(it.action==="list_deselect_all"){
    S.selectedPlayers={}; send("list_deselect_all",""); render(); return;
  }
  if(it.action==="safe_friend"){
    selectedIds().forEach(function(id){
      var p=S.players.find(function(x){return x.id===id;});
      if(!p) return;
      S.friendMap[p.serverId]=!S.friendMap[p.serverId];
      send("safe_friend", p.serverId, {friend:!!S.friendMap[p.serverId]});
    });
    render(); return;
  }
  if(it.action==="settings_clear_binds"){
    S.keybinds={}; send("settings_clear_binds",""); updateKbList(); render(); return;
  }
  if(it.action==="settings_rebind_open"){ send("settings_rebind_open",""); return; }

  var extra={targets:selectedTargets()};
  var lists={animals:ANIMALS,pickups:PICKUPS,objects:OBJECTS,weapons:WEAPONS,vehicles:VEHICLES,particles:PARTICLES,npcs:NPCS};
  if(it.dropdown==="teleportMode") extra.mode = dget("teleportMode",0)===0?"player":"vehicle";
  else if(it.dropdown){
    var key=it.dropdown;
    var arr=lists[it.optionsKey]||(key==="animal"?ANIMALS:key==="pickup"?PICKUPS:key==="object"?OBJECTS:key==="killWep"||key==="riskWep"?WEAPONS:key==="ramVeh"||key==="ghostVeh"?VEHICLES:key==="particle"?PARTICLES:key==="npc"?NPCS:[]);
    extra.option=arr[dget(key,0)]||"";
  }
  if(it.dropdown2){
    var arr2=lists[it.optionsKey2]||WEAPONS;
    if(it.dropdown2==="atkWep") arr2=["WEAPON_UNARMED"].concat(WEAPONS);
    extra.option2=arr2[dget(it.dropdown2,0)]||"";
  }
  if(it.action==="model_set"){
    send("model_set", ANIMALS[dget("animal",0)]||ANIMALS[0], extra); return;
  }
  if(it.action==="player_health"){ send("player_health", vget("health",200), extra); return; }
  if(it.action==="player_armor"){ send("player_armor", vget("armor",100), extra); return; }
  if(it.action==="risky_weapon"||it.action==="risky_particle"){
    send(it.action, extra.option||"", extra); return;
  }
  send(it.action, extra.option||"", extra);
}

window.addEventListener("message",function(ev){
  var d=ev.data;
  if(typeof d==="string"){ try{d=JSON.parse(d);}catch(e){return;} }
  if(!d||!d.type) return;
  switch(d.type){
    case "boot": showBoot(); break;
    case "bootPreview": bootCap.textContent=d.name||"?"; break;
    case "bootDone":
      bootCap.textContent=d.name||"?";
      setTimeout(function(){ hideBoot(); updateKbListVis(); },400);
      break;
    case "show": showMenu(); break;
    case "hide": hideMenu(); break;
    case "players":
      S.players=Array.isArray(d.list)?d.list:S.players;
      if(S.tab==="server_list"&&S.visible) render();
      else if(S.hoverPlayer!=null){
        var p=S.players.find(function(x){return x.id===S.hoverPlayer;});
        if(p) showPlayerInfo(p);
      }
      break;
    case "setKeybind":
      if(d.action){
        S.keybinds[d.action]={name:d.name||"KEY",label:d.label||d.action,code:d.code};
        S.bindingAction=null; kbcapt.classList.remove("show");
        updateKbList(); if(S.visible) render();
      }
      break;
    case "binding":
      S.bindingAction={action:d.action,label:d.label||d.action};
      kbcapt.classList.add("show");
      kbcapt.querySelector("span").textContent=d.label||d.action;
      break;
    case "cancelBind": S.bindingAction=null; kbcapt.classList.remove("show"); break;
    case "kblistPos":
      if(d.x!=null){ kblist.style.left=d.x+"px"; kblist.style.top=d.y+"px"; kblist.style.right="auto"; }
      break;
    case "kblistVisible":
      S.showKeybindList=!!d.show; S.toggles.show_kblist=S.showKeybindList;
      updateKbListVis(); if(S.tab==="settings"&&S.visible) render();
      break;
    case "friends":
      S.friendMap=d.map||{}; if(S.visible) render();
      break;
  }
});

window.__MEC_Q=[];
window.__MEC_FLUSH=function(){
  if(!window.__MEC_Q.length) return "";
  return JSON.stringify(window.__MEC_Q.shift());
};

renderSide();
})();
</script>
